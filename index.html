<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Seeded Word Search</title>
    <style>
        :root {
            --bg-color: #121212;
            --text-color: #ffffff;
            --grid-bg: #1e1e1e;
            --cell-bg: #2d2d2d;
            --cell-hover: #3d3d3d;
            --selected: #f39c12; /* Switched selected to a nice orange to contrast the heat map */
            --error: #e74c3c;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
            user-select: none;
        }

        .header {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 500px;
            margin-bottom: 20px;
            font-size: 1.2rem;
            font-weight: bold;
        }

        #grid {
            display: grid;
            grid-template-columns: repeat(10, 40px);
            grid-template-rows: repeat(10, 40px);
            gap: 5px;
            background-color: var(--grid-bg);
            padding: 10px;
            border-radius: 8px;
            touch-action: none;
        }

        .cell {
            background-color: var(--cell-bg);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }

        .cell:hover { background-color: var(--cell-hover); }
        .cell.selected { background-color: var(--selected); color: white; transform: scale(1.05); }

        /* --- 1. The Heatmap Colors --- */
        .cell.found-1 { background-color: #27ae60; color: white; } /* Green */
        .cell.found-2 { background-color: #2980b9; color: white; } /* Blue */
        .cell.found-3 { background-color: #8e44ad; color: white; } /* Purple */
        .cell.found-max { 
            background-color: #e84393; 
            color: white; 
            box-shadow: 0 0 8px #e84393; /* Pink Glow */
        } 

        /* --- 2. The Epic Word Pulse Animation --- */
        @keyframes epicPulse {
            0% { transform: scale(1); box-shadow: 0 0 0px transparent; z-index: 1; }
            50% { transform: scale(1.25); box-shadow: 0 0 15px #f1c40f; background-color: #f1c40f; z-index: 10; }
            100% { transform: scale(1); box-shadow: 0 0 0px transparent; z-index: 1; }
        }
        .cell.pulse {
            animation: epicPulse 0.6s ease-out;
        }

        #message {
            margin-top: 15px;
            height: 24px;
            font-weight: bold;
            color: var(--error);
        }

        #word-list {
            margin-top: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            max-width: 500px;
            justify-content: center;
        }

        .found-word {
            background-color: #27ae60;
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 0.9rem;
            transition: transform 0.2s;
        }

        /* Highlight for long words in the list */
        .found-word.epic-badge {
            background-color: #f1c40f;
            color: #000;
            font-weight: bold;
            box-shadow: 0 0 5px #f1c40f;
            transform: scale(1.1);
        }
    </style>
</head>
<body>

    <div class="header">
        <div>Time: <span id="timer">10:00</span></div>
        <div>Score: <span id="score">0</span></div>
    </div>

    <div id="grid"></div>
    <div id="message">Loading dictionary...</div>
    <div id="word-list"></div>

    <script>
        // --- Deterministic PRNG Setup ---
        const today = new Date().toISOString().split('T')[0];
        function mulberry32(a) {
            return function() {
              var t = a += 0x6D2B79F5;
              t = Math.imul(t ^ t >>> 15, t | 1);
              t ^= t + Math.imul(t ^ t >>> 7, t | 61);
              return ((t ^ t >>> 14) >>> 0) / 4294967296;
            }
        }
        function xmur3(str) {
            for(var i = 0, h = 1779033703 ^ str.length; i < str.length; i++) {
                h = Math.imul(h ^ str.charCodeAt(i), 3432918353);
                h = h << 13 | h >>> 19;
            } return function() {
                h = Math.imul(h ^ (h >>> 16), 2246822507);
                h = Math.imul(h ^ (h >>> 13), 3266489909);
                return (h ^= h >>> 16) >>> 0;
            }
        }
        const seedFunc = xmur3(today);
        const random = mulberry32(seedFunc());

        // --- Weighted Letter Distribution ---
        const vowels = ['E','E','E','E','A','A','A','O','O','O','I','I','U'];
        const consonants = ['T','T','T','N','N','R','R','S','S','H','H','D','L','C','M','F','Y','W','G','P','B','V','K','X','Q','J','Z'];
        function getRandomLetter() {
            const isVowel = random() < 0.40; 
            const pool = isVowel ? vowels : consonants;
            const index = Math.floor(random() * pool.length);
            return pool[index];
        }

        // --- Game State ---
        let score = 0;
        let timeRemaining = 600; 
        let timerInterval;
        let isDragging = false;
        let dragPath = [];
        let dragDirection = null; 
        const foundWords = new Set();
        let validDictionary = new Set();
        let gameActive = false;

        // --- Load Dictionary ---
        fetch('valid_words.txt')
            .then(response => response.text()) 
            .then(data => {
                const wordArray = data.split('\n')
                                      .map(word => word.trim().toUpperCase())
                                      .filter(word => word.length >= 3);
                validDictionary = new Set(wordArray);
                gameActive = true;
                showMessage(""); 
                timerInterval = setInterval(updateTimer, 1000); 
            })
            .catch(error => {
                console.error("Failed to load dictionary:", error);
                showMessage("Error loading valid_words.txt. Check local server (CORS).");
            });

        // --- Grid Generation ---
        const gridElement = document.getElementById('grid');
        const cells = [];

        for (let y = 0; y < 10; y++) {
            for (let x = 0; x < 10; x++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.textContent = getRandomLetter();
                cell.dataset.x = x;
                cell.dataset.y = y;
                cell.dataset.uses = 0; // Initialize use counter
                
                cell.addEventListener('mousedown', () => startDrag(cell, x, y));
                cell.addEventListener('mouseenter', () => continueDrag(cell, x, y));
                
                gridElement.appendChild(cell);
                cells.push(cell);
            }
        }

        window.addEventListener('mouseup', endDrag);

        // --- Interaction Logic ---
        function startDrag(cell, x, y) {
            if (!gameActive) return;
            isDragging = true;
            dragPath = [{cell, x, y}];
            dragDirection = null;
            cell.classList.add('selected');
            showMessage(""); 
        }

        function continueDrag(cell, x, y) {
            if (!isDragging || !gameActive) return;
            const lastNode = dragPath[dragPath.length - 1];
            const dx = x - lastNode.x;
            const dy = y - lastNode.y;

            if (Math.abs(dx) > 1 || Math.abs(dy) > 1) return;
            if (dx === 0 && dy === 0) return;

            if (dragPath.length === 1) {
                dragDirection = { dx, dy };
                addCellToPath(cell, x, y);
            } else {
                if (dx === dragDirection.dx && dy === dragDirection.dy) {
                    addCellToPath(cell, x, y);
                }
            }
        }

        function addCellToPath(cell, x, y) {
            dragPath.push({cell, x, y});
            cell.classList.add('selected');
        }

        function endDrag() {
            if (!isDragging || !gameActive) return;
            isDragging = false;
            const word = dragPath.map(node => node.cell.textContent).join('');
            
            if (word.length >= 3) {
                validateWord(word);
            } else if (word.length > 0) {
                showMessage("Words must be at least 3 letters.");
                clearSelection();
            }
        }

        // --- Validation and Visual Feedback ---
        function validateWord(word) {
            if (foundWords.has(word)) {
                showMessage("Already found!");
                clearSelection();
                return;
            }

            const isValid = validDictionary.has(word);
            const isEpic = word.length > 5; // Check for Epic words

            if (isValid) {
                score += word.length;
                document.getElementById('score').textContent = score;
                foundWords.add(word);
                
                // Build the word badge
                const wordBadge = document.createElement('div');
                wordBadge.className = 'found-word';
                if (isEpic) wordBadge.classList.add('epic-badge');
                wordBadge.textContent = word;
                
                // Add to the top of the list so it's always visible
                const wordList = document.getElementById('word-list');
                wordList.insertBefore(wordBadge, wordList.firstChild);

                // Update the grid visuals
                dragPath.forEach((node, index) => {
                    node.cell.classList.remove('selected');
                    
                    // Increment the use counter for this cell
                    let uses = parseInt(node.cell.dataset.uses);
                    uses++;
                    node.cell.dataset.uses = uses;

                    // Apply the correct heat map class
                    node.cell.classList.remove('found-1', 'found-2', 'found-3', 'found-max');
                    if (uses === 1) node.cell.classList.add('found-1');
                    else if (uses === 2) node.cell.classList.add('found-2');
                    else if (uses === 3) node.cell.classList.add('found-3');
                    else node.cell.classList.add('found-max');

                    // If it's an epic word, trigger the cascading pulse animation
                    if (isEpic) {
                        node.cell.classList.remove('pulse');
                        // Stagger the animation slightly based on letter index
                        setTimeout(() => {
                            node.cell.classList.add('pulse');
                        }, index * 50); 
                        
                        // Clean up the animation class so it can play again later
                        setTimeout(() => {
                            node.cell.classList.remove('pulse');
                        }, (index * 50) + 600);
                    }
                });
                dragPath = [];
            } else {
                showMessage("Not in dictionary");
                clearSelection();
            }
        }

        function clearSelection() {
            dragPath.forEach(node => {
                node.cell.classList.remove('selected');
            });
            dragPath = [];
        }

        function showMessage(msg) {
            document.getElementById('message').textContent = msg;
        }

        // --- Timer Logic ---
        function updateTimer() {
            if (timeRemaining <= 0) {
                clearInterval(timerInterval);
                gameActive = false;
                document.getElementById('timer').textContent = "00:00";
                showMessage("Time's Up!");
                return;
            }
            timeRemaining--;
            const m = Math.floor(timeRemaining / 60).toString().padStart(2, '0');
            const s = (timeRemaining % 60).toString().padStart(2, '0');
            document.getElementById('timer').textContent = `${m}:${s}`;
        }
    </script>
</body>
</html>
